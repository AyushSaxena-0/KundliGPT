name: AI Vedic Astrologer CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend Test Suite (FastAPI)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Environment Configuration
        run: |
          # Write a dummy .env file for configuration validation checks
          echo "GEMINI_API_KEY=mock_key_for_ci" > .env
          echo "ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000" >> .env
          echo "ENVIRONMENT=development" >> .env
          echo "DEBUG=true" >> .env
          echo "APP_NAME=AI Vedic Astrologer CI" >> .env
          echo "BACKEND_URL=http://localhost:8000" >> .env

      - name: Run Test Suite
        run: |
          pytest -v

  frontend-test:
    name: Frontend Quality Check (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json # Falls back if lockfile exists

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run Linting & Type Checks
        run: |
          # Check typescript compilation
          npx tsc --noEmit

      - name: Run Unit Tests
        run: |
          npm run test --passWithNoTests
